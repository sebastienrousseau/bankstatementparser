name: Security

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          # The three litellm advisories below are all scoped to the
          # optional `litellm proxy` server binary (OIDC userinfo
          # cache, unrestricted proxy config endpoint, password hash
          # exposure). This library only imports
          # `litellm.completion()` from the `[hybrid]` extra — it
          # never runs the proxy server. The proxy attack surface is
          # not reachable from any code we ship.
          #
          # We cannot simply bump to litellm >= 1.83.0 across the
          # board because litellm 1.83+ requires Python >= 3.12 while
          # bankstatementparser still supports Python 3.9-3.11. The
          # resolver therefore keeps 1.80.0 pinned on the older
          # interpreters. Revisit this allow-list the next time the
          # minimum Python version is raised.
          #
          #   litellm (proxy server only — we import completion()):
          #     GHSA-jjhc-v7c2-5hh6  OIDC userinfo cache collision
          #     GHSA-53mr-6c8q-9789  Proxy config endpoint priv-esc
          #     GHSA-69x8-hrgq-fjj8  Password hash exposure
          #
          #   cryptography (transitive via litellm):
          #     GHSA-r6ph-v2qm-q3c2  SECT curve subgroup attack — we
          #         do not use SECT/binary-field curves anywhere; the
          #         attack requires the caller to pass attacker-
          #         controlled SECT public keys to ECDH, which has no
          #         reachable path from our codebase. Patched in
          #         46.0.5 but that wheel requires Python > 3.9.1 and
          #         we still support Python 3.9.0/3.9.1.
          #     GHSA-79v4-65xg-pq4g  OpenSSL bundled in older wheels
          #         — only affects users running TLS handshakes
          #         through cryptography's bindings, which we never
          #         do. Patched in 44.0.1 but blocked by the same
          #         Python floor as above.
          #     GHSA-m959-cc7f-wv43  Incomplete DNS name constraint
          #         enforcement on X.509 peer names — only matters
          #         when using cryptography to validate X.509 certs
          #         for peer authentication, which we never do.
          #         Patched in 46.0.6, blocked by the same Python
          #         floor.
          allow-ghsas: >-
            GHSA-jjhc-v7c2-5hh6,
            GHSA-53mr-6c8q-9789,
            GHSA-69x8-hrgq-fjj8,
            GHSA-r6ph-v2qm-q3c2,
            GHSA-79v4-65xg-pq4g,
            GHSA-m959-cc7f-wv43

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  python-security:
    name: Python Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install project and audit tools
        run: |
          poetry install --with dev
          poetry self add poetry-plugin-export@">=1.8"
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Verify lockfile hashes
        run: poetry run python scripts/verify_locked_hashes.py

      - name: Verify hashed dependency export
        run: |
          poetry export --format=requirements.txt --with dev > /tmp/requirements-hashed.txt
          python -m pip install --dry-run --require-hashes -r /tmp/requirements-hashed.txt

      - name: Bandit SAST
        run: |
          poetry run bandit -r bankstatementparser examples scripts -c pyproject.toml

      - name: Generate SBOM
        run: |
          poetry run python scripts/generate_sbom.py \
            --output /tmp/sbom.cyclonedx.json \
            --markdown-output /tmp/dependency-report.md

      - name: Pip audit
        run: |
          poetry export --format=requirements.txt --without-hashes --with dev > /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt
