name: Security

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  python-security:
    name: Python Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install project and audit tools
        run: |
          poetry install --with dev
          poetry self add poetry-plugin-export@">=1.8"
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Verify lockfile hashes
        run: poetry run python scripts/verify_locked_hashes.py

      - name: Verify hashed dependency export
        run: |
          poetry export --format=requirements.txt --with dev > /tmp/requirements-hashed.txt
          python -m pip install --dry-run --require-hashes -r /tmp/requirements-hashed.txt

      - name: Bandit SAST
        run: |
          poetry run bandit -r bankstatementparser examples scripts -c pyproject.toml

      - name: Generate SBOM
        run: |
          poetry run python scripts/generate_sbom.py \
            --output /tmp/sbom.cyclonedx.json \
            --markdown-output /tmp/dependency-report.md

      - name: Pip audit
        run: |
          poetry export --format=requirements.txt --without-hashes --with dev > /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt
