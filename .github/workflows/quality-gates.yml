name: Quality Gates

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E excel

      - name: Ruff
        run: poetry run ruff check bankstatementparser tests examples scripts

      - name: Ruff format
        run: poetry run ruff format --check bankstatementparser tests examples scripts

      - name: Mypy
        run: poetry run mypy bankstatementparser

  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Full version sweep on Linux; macOS and Windows run the
      # version bounds (oldest + newest) to catch platform issues
      # without tripling the matrix.
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: "macos-latest"
            python-version: "3.10"
          - os: "macos-latest"
            python-version: "3.14"
          - os: "windows-latest"
            python-version: "3.10"
          - os: "windows-latest"
            python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E excel

      - name: Run unit and package-quality suite
        # Collect everything under tests/ for unit coverage. Integration
        # tests that don't drive package coverage run in a separate job
        # without coverage; the pytest-benchmark suite is excluded here
        # because it requires baseline files and is not part of the
        # coverage gate. ``test_zip_security.py`` lives under integration/
        # but exercises ``bankstatementparser.zip_security`` directly, so
        # it stays in the coverage run.
        shell: bash
        run: |
          poetry run pytest tests/ \
            --ignore=tests/integration/test_malformed_data.py \
            --ignore=tests/integration/test_security_boundaries.py \
            --ignore=tests/integration/test_supply_chain_tools.py \
            --ignore=tests/test_benchmark_suite.py

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E excel

      - name: Run integration regression suite
        run: |
          poetry run pytest --no-cov tests/integration tests/test_enterprise_coverage.py

      - name: Run performance contracts (slow suite)
        # Timing-sensitive tests are excluded from the coverage run
        # (`-m "not slow"` in pyproject addopts) so they don't flake
        # under coverage instrumentation. The CLI -m overrides it.
        run: |
          poetry run pytest --no-cov -m slow tests/test_performance_contracts.py

  platform-parity:
    name: Platform Parity
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E excel

      - name: Run cross-platform smoke suite
        shell: bash
        run: >
          poetry run pytest --no-cov
          tests/test_camt_parser.py
          tests/test_pain001_parser.py
          tests/test_cli.py
          tests/integration/test_supply_chain_tools.py

  benchmarks:
    name: Benchmark Regression (non-blocking)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E excel

      - name: Restore benchmark baseline
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .benchmarks
          key: benchmark-baseline-${{ runner.os }}-py312
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-py312

      - name: Run benchmarks and compare against baseline
        # Non-blocking by design: shared-runner timing variance makes a
        # hard gate too flaky. A >25% mean regression shows up as a
        # failed step annotation for humans to investigate.
        continue-on-error: true
        run: |
          if compgen -G ".benchmarks/*/*.json" > /dev/null; then
            poetry run pytest --no-cov tests/test_benchmark_suite.py \
              --benchmark-only --benchmark-autosave \
              --benchmark-compare --benchmark-compare-fail=mean:25%
          else
            echo "No baseline found; recording first benchmark run."
            poetry run pytest --no-cov tests/test_benchmark_suite.py \
              --benchmark-only --benchmark-autosave
          fi

      - name: Save benchmark baseline
        # Only main-branch pushes refresh the baseline, so PRs are
        # compared against the last known-good main run.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .benchmarks
          key: benchmark-baseline-${{ runner.os }}-py312-${{ github.run_id }}

  llm-eval:
    name: LLM Accuracy Eval (non-blocking)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev -E hybrid

      - name: Harness self-check (mock mode, no model)
        # Deterministic: loads every ground-truth case, runs the full
        # extract -> score -> report path against perfect mock answers.
        # A failure here means the harness itself broke.
        run: poetry run python scripts/run_llm_eval.py --mock

      - name: Run accuracy eval against configured model
        # Gated on the BSP_EVAL_MODEL repository variable so forks and
        # model-less runs skip silently. Non-blocking by design:
        # accuracy drift surfaces as a failed-step annotation for
        # humans, it never blocks a merge.
        if: vars.BSP_EVAL_MODEL != ''
        continue-on-error: true
        env:
          BSP_HYBRID_MODEL: ${{ vars.BSP_EVAL_MODEL }}
          BSP_HYBRID_API_BASE: ${{ secrets.BSP_EVAL_API_BASE }}
        run: poetry run python scripts/run_llm_eval.py
