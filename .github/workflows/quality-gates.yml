name: Quality Gates

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check bankstatementparser tests examples scripts

      - name: Mypy
        run: poetry run mypy bankstatementparser

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit and package-quality suite
        run: |
          poetry run pytest \
            tests/test_transaction_deduplicator.py \
            tests/test_polars_export.py \
            tests/test_additional_parsers.py \
            tests/test_input_validator.py \
            tests/test_camt_parser.py \
            tests/test_security_updated.py \
            tests/test_performance.py \
            tests/test_unified_interface.py \
            tests/test_security.py \
            tests/test_pain001_parser.py \
            tests/test_bank_statement_parsers.py \
            tests/test_cli.py \
            tests/test_pii_redaction.py \
            tests/test_edge_cases.py \
            tests/test_branch_coverage.py \
            tests/test_coverage_gaps.py \
            tests/test_enterprise_coverage.py \
            tests/test_property_based.py \
            tests/test_large_file_streaming.py \
            tests/test_performance_contracts.py \
            tests/test_hybrid_cli.py \
            tests/test_hybrid_dedupe_by_hash.py \
            tests/test_hybrid_llm_extractor.py \
            tests/test_hybrid_ollama_direct.py \
            tests/test_hybrid_orchestrator.py \
            tests/test_hybrid_pdf_text.py \
            tests/test_hybrid_review_cli.py \
            tests/test_hybrid_verification.py \
            tests/test_hybrid_vision.py \
            tests/test_enrichment_categorizer.py \
            tests/test_docs_accuracy.py \
            tests/integration/test_zip_security.py

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run integration regression suite
        run: |
          poetry run pytest --no-cov tests/integration tests/test_enterprise_coverage.py

  platform-parity:
    name: Platform Parity
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run cross-platform smoke suite
        shell: bash
        run: >
          poetry run pytest --no-cov
          tests/test_camt_parser.py
          tests/test_pain001_parser.py
          tests/test_cli.py
          tests/integration/test_supply_chain_tools.py
