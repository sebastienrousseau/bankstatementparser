name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: |
          poetry run ruff check bankstatementparser tests examples scripts
          poetry run ruff format --check bankstatementparser tests examples scripts

      - name: Mypy
        run: poetry run mypy bankstatementparser scripts

      - name: Pytest with coverage
        run: poetry run pytest

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'pull_request' || env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: ./coverage.xml
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
