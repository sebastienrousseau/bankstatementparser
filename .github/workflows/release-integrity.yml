name: Release Integrity

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build-and-attest:
    name: Build, Checksum, SBOM, and Attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install build dependencies
        run: poetry install --with dev

      - name: Verify lockfile hashes
        run: poetry run python scripts/verify_locked_hashes.py

      - name: Build wheel and sdist
        run: poetry build

      - name: Generate checksums
        run: python scripts/generate_checksums.py dist

      - name: Generate SBOM and dependency report
        run: |
          poetry run python scripts/generate_sbom.py \
            --output dist/sbom.cyclonedx.json \
            --markdown-output dist/dependency-report.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-integrity-artifacts
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: "dist/*"
