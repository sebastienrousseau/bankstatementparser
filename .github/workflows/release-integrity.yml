name: Release Integrity

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build-and-attest:
    name: Build, Checksum, SBOM, and Attest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: "2.3.2"

      - name: Install build dependencies
        run: |
          poetry install --with dev
          poetry self add poetry-plugin-export@">=1.8"

      - name: Verify lockfile hashes
        run: poetry run python scripts/verify_locked_hashes.py

      - name: Build wheel and sdist
        run: poetry build

      - name: Generate checksums
        run: python scripts/generate_checksums.py dist

      - name: Generate SBOM and dependency report
        run: |
          poetry run python scripts/generate_sbom.py \
            --output dist/sbom.cyclonedx.json \
            --markdown-output dist/dependency-report.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-integrity-artifacts
          path: dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: "dist/*"
